<!-- Arquivo index.html -->

<DOCTYPE html>
  <html lang="pt-br">
    <head>
      <title>Meu Site</title>
      <style></style>
      <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js" integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F" crossorigin="anonymous"></script>
    </head>
    <body>
      <h1>Meu Site</h1>
      <p>Bem vindo ao meu site!</p>
      <nav>
        <button hx-post="/home/pagina1"
          hx-target="main"
          hx-push-url="true">
          Página 1
        </button>
        <button hx-get="/home/pagina2"
          hx-target="main"
          hx-push-url="true">
          Página 2
        </button>
      </nav>
      <hr>
        <button hx-post="/curtir"
          hx-target="#curtidas"
        >
          Curte
        </button>
        <button hx-delete="/curtir"
          hx-target="#curtidas"
          hx-confirm="Confirma ai po"
        >
          Deleta todas as curtidas
        </button>
      <div id="curtidas">0</div>
      <main hx-get="{{ pagina }}"
        hx-target="main"
        hx-trigger="load"
        hx-push-url="true">
      </main>
    </body>
  </html>
